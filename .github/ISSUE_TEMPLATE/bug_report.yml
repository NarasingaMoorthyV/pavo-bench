name: Bug report
description: A script in this repo doesn't work, or its output doesn't match the committed JSON.
title: "[Bug] <one-line summary>"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Smallest command or code snippet that shows the bug.
      render: bash
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, relevant package versions, GPU/driver if applicable.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste the error output, or attach it as a file.
      render: text
